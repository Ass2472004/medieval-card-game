name: Build — Android (Google Play) + Windows

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options: [android, windows, both]

env:
  UNITY_VERSION: 6000.4.0f1
  GAME_VERSION:  ${{ github.ref_name }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android AAB → Google Play
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform != 'windows' }}
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**','Packages/**','ProjectSettings/**') }}
          restore-keys: Library-Android-

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > nahkor.keystore
          echo "ANDROID_KEYSTORE_NAME=$(pwd)/nahkor.keystore" >> $GITHUB_ENV

      - name: Build Android (GameCI)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL:           ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD:        ${{ secrets.UNITY_PASSWORD }}
          ANDROID_KEYSTORE_NAME: ${{ env.ANDROID_KEYSTORE_NAME }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS:     ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS:      ${{ secrets.ANDROID_KEY_PASS }}
          GAME_VERSION:          ${{ env.GAME_VERSION }}
        with:
          unityVersion:      ${{ env.UNITY_VERSION }}
          targetPlatform:    Android
          androidExportType: androidAppBundle
          buildMethod:       BuildScript.BuildAndroid

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nahkor-Android-${{ github.sha }}
          path: build/Android/*.aab
          retention-days: 30

      - name: Upload to Google Play (Internal Track)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName:  com.alejandross.nahkor
          releaseFiles: build/Android/*.aab
          track:        internal
          status:       completed

  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE (portátil)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform != 'android' }}
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**','Packages/**','ProjectSettings/**') }}
          restore-keys: Library-Windows-

      - name: Build Windows (GameCI)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          GAME_VERSION:   ${{ env.GAME_VERSION }}
        with:
          unityVersion:   ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneWindows64
          buildMethod:    BuildScript.BuildWindows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nahkor-Windows-${{ github.sha }}
          path: build/Windows/
          retention-days: 30
