name: Build Android (Google Play)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build AAB for Google Play
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Build with GameCI
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:     6000.4.0f1
          targetPlatform:   Android
          androidExportType: androidAppBundle
          androidKeystoreName:   medieval-cards.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass:   ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName:   ${{ secrets.ANDROID_KEY_ALIAS }}
          androidKeyaliasPass:   ${{ secrets.ANDROID_KEY_PASS }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: medieval-card-game-aab
          path: build/Android/*.aab
          retention-days: 14

      - name: Upload to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName:                 com.alejandross.medievalcards
          releaseFiles:                build/Android/*.aab
          track:                       internal
          status:                      draft
